<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3XP's Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #0e0e0f;
      --surface:     #161618;
      --surface2:    #1e1e21;
      --border:      #2a2a2e;
      --accent:      #e8b84b;
      --accent2:     #5bcefa;
      --text:        #d4d4d8;
      --text-muted:  #71717a;
      --heading:     #f4f4f5;
      --radius:      6px;
      --font-display:'Bebas Neue', sans-serif;
      --font-mono:   'DM Mono', monospace;
      --font-body:   'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.65;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section { padding: 64px 0; }

    .display {
      font-family: var(--font-display);
      font-size: clamp(3rem, 9vw, 6.5rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
      color: var(--heading);
    }

    .title {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    #top {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 60px;
      position: relative;
      overflow: hidden;
    }
    #top::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(232,184,75,.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(91,206,250,.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .top-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      margin-bottom: 20px;
    }

    .top-aliases {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }
    .top-aliases span { color: var(--accent2); }

    #quote-box {
      margin-top: 24px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      font-style: italic;
      max-width: 500px;
      min-height: 1.2em;
    }

    .scroll-hint {
      position: absolute;
      bottom: 28px;
      right: 28px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      writing-mode: vertical-rl;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scroll-hint::before {
      content: '';
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .link-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text);
      transition: border-color .2s, color .2s, transform .15s;
    }
    .link-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      text-decoration: none;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .2s, transform .15s;
    }
    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .project-card h3 {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--heading);
    }
    .project-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      flex: 1;
    }
    .project-card a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      align-self: flex-start;
    }

    .info-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      display: grid;
      gap: 20px;
    }
    .info-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .info-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent2);
      letter-spacing: 0.08em;
      min-width: 120px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .info-value { font-size: 0.9rem; color: var(--text); }
    .info-value ul { list-style: none; padding: 0; }
    .info-value ul li::before { content: '→ '; color: var(--accent); }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    .contact-card .platform {
      color: var(--accent);
      font-weight: 500;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    .hidden {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .hidden.visible {
      opacity: 1;
      transform: none;
    }
  </style>
</head>
<body>

<script>
const CONFIG = {
  name:    "3XP",
  aliases: ["Zig", "John SOF"],
  avatar:  "img/avatar.png", 

  quotes: {
    0: "We love the weekend, right guys?",
    1: "Oops, looks like we can't play G/D anymore..",
    2: "This day IS the worst. Screw tuesdays.",
    3: "Remember when Decaying Winter got updated? Not referring to DW:R.",
    4: "Thank god, it is almost friday!",
    5: "It IS friday! Hop on G/D bro",
    6: "More G/D. Again. Feed me elite slop.",
  },

  links: [
    {label: "Old Portfolio", url: "https://3xp1.carrd.co"},
    {label: "itch.io", url: "https://xpstu.itch.io"},
  ],

  projects: [
    {
      name: "FastForgeSkript",
      desc: "A semi-working programming language for text-based things. This is buns.",
      url:  "https://xpstu.itch.io/fastforgeskript",
    },
    {
      name: "Decaying Winter: Revamped",
      desc: "A Decaying Winter-like game testing my skills. Currently, development is paused.",
      url:  "https://xpstu.itch.io/dw-r",
    },
    {
      name: "PRIM",
      desc: "A tactical door-breaching game. Loosely based off of Grave/Digger, HELLMET, and DW:R.",
      url:  "https://xpstu.itch.io/prim",
    },
    {
      name: "Bits of Code",
      desc: "Miscellaneous snippets I've written and shared.",
      url:  "https://github.com/NetheriteBlockXI/bits-of-code",
    },
  ],

  about: [
    {label: "username", value: "3XP"},
    {label: "interests", value: "Scratch for games, but trying to learn C++."},
    {label: "orientation", value: "Straight, but I don't really get any romantical attractions."},
    {label: "fav. game", value: "Grave/Digger"},
    {
      label: "likes",
      list: [
        "Decaying Winter",
        "Ultrakill",
        "Demise Of Eden",
        "Industrialist",
        "Grave/Digger",
      ],
    },
    {
      label: "dislikes",
      list: [
	  "People that are rude without reason.",
	  "Various other random (or not) things."
	  ],
    },
    {
      label: "Fun facts about me:",
      value: "I like survival games and somewhat complex games.",
    },
  ],

  takes: [
    {
      label: "cold take",
      value: "Singleplayer games with well-designed mechanics are more fun than repetitive multiplayer games.",
    },
    {
      label: "on coding",
      value: "Efficient code over clean code.",
    },
    {
      label: "on gaming",
      value: "Microtransactions should never be essential to progression.",
    },
    {
      label: "on community",
      value: "Allowing others to use your code produces faster, cleaner, and better-looking games.",
    },
    {
      label: "on arguments",
      value: "Offensive arguments are useless. General arguments can prove a point.",
    },
  ],

  contact: [
    { platform: "GitHub",  value: "NetheriteBlockXI", url: "https://github.com/NetheriteBlockXI" },
    { platform: "Discord", value: "_3xp", url: null },
  ],

};

</script>

<section id="top">
  <div class="container">
    <img id="top-avatar" class="top-avatar" alt="Avatar">
    <div class="top-aliases" id="top-aliases"></div>
    <h1 class="display" id="top-name"></h1>
    <div id="quote-box"></div>
  </div>
  <div class="scroll-hint">scroll</div>
</section>

<hr class="divider">

<section id="links">
  <div class="container">
    <h2 class="title">LINKS</h2>
    <div class="links-grid" id="links-grid"></div>
  </div>
</section>

<hr class="divider">

<section id="projects">
  <div class="container">
    <h2 class="title">PROJECTS</h2>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</section>

<hr class="divider">

<section id="about">
  <div class="container">
    <h2 class="title">ABOUT ME</h2>
    <div class="info-block" id="about-block"></div>
  </div>
</section>

<hr class="divider">

<section id="takes">
  <div class="container">
    <h2 class="title">TAKES</h2>
    <div class="info-block" id="takes-block"></div>
  </div>
</section>

<hr class="divider">

<section id="contact">
  <div class="container">
    <h2 class="title">CONTACT</h2>
    <div class="contact-grid" id="contact-grid"></div>
  </div>
</section>

<footer>
  <div class="container">
    built by <span style="color:var(--accent)">3xp</span> · xp studios
  </div>
</footer>

<script>
  document.getElementById('top-avatar').src = CONFIG.avatar;
  document.getElementById('top-name').textContent = CONFIG.name;
  document.getElementById('top-aliases').innerHTML =
    'aka ' + CONFIG.aliases.map(a => `<span>${a}</span>`).join(' / ');

  const day = new Date().getDay();
  const quote = CONFIG.quotes[day] || '';
  if (quote) document.getElementById('quote-box').textContent = `"${quote}"`;

  const linksGrid = document.getElementById('links-grid');
  CONFIG.links.forEach(link => {
    const a = document.createElement('a');
    a.className = 'link-chip';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = link.label;
    linksGrid.appendChild(a);
  });

  const projectsGrid = document.getElementById('projects-grid');
  CONFIG.projects.forEach(p => {
    projectsGrid.innerHTML += `
      <div class="project-card hidden">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <a href="${p.url}" target="_blank" rel="noopener noreferrer">view →</a>
      </div>`;
  });

  function renderInfoBlock(el, rows) {
    rows.forEach(row => {
      const div = document.createElement('div');
      div.className = 'info-row hidden';
      let valueHTML = '';
      if (row.list) {
        valueHTML = '<ul>' + row.list.map(i => `<li>${i}</li>`).join('') + '</ul>';
      } else {
        valueHTML = row.value || '';
      }
      div.innerHTML = `<span class="info-label">${row.label}</span><span class="info-value">${valueHTML}</span>`;
      el.appendChild(div);
    });
  }

  renderInfoBlock(document.getElementById('about-block'), CONFIG.about);
  renderInfoBlock(document.getElementById('takes-block'), CONFIG.takes);

  const contactGrid = document.getElementById('contact-grid');
  CONFIG.contact.forEach(c => {
    const el = c.url
      ? `<a href="${c.url}" target="_blank" rel="noopener noreferrer" class="contact-card"><span class="platform">${c.platform}</span> ${c.value}</a>`
      : `<div class="contact-card"><span class="platform">${c.platform}</span> ${c.value}</div>`;
    contactGrid.innerHTML += el;
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.hidden').forEach(el => obs.observe(el));
</script>
</body>
</html>
